<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{#insert title}Notenfuchs{/insert}</title>
    <link rel="stylesheet" href="/static/css/notenfuchs.css">
    <script src="/static/js/htmx.min.js"></script>
</head>
<body>
<header class="app-header">
    <div class="app-header-inner">
        <a class="brand" href="/">🦊 Notenfuchs</a>
        <nav class="main-nav">
            <a href="/classes">Klassen</a>
        </nav>
        <div class="user-info">
            {#if currentUserAuthenticated}
                <span>Angemeldet als {currentUserDisplayName}</span>
                {#if localAuthActive}
                <form method="post" action="/local-logout" style="display:inline; margin:0;">
                    <button type="submit" style="all:unset; cursor:pointer; color:var(--color-primary);">Logout</button>
                </form>
                {#else}
                <a href="/logout">Logout</a>
                {/if}
            {#else}
                <span class="dev-mode-badge">Dev-Modus (kein Login)</span>
                {#if devIdentitySwitchActive}
                    <span>Als: {devEffectiveSubject}</span>
                    <a href="/dev/identity">Identität wechseln</a>
                {/if}
            {/if}
        </div>
    </div>
</header>
<main class="app-main">
    {#insert /}
</main>
<script src="/static/js/notenfuchs.js"></script>
</body>
</html>
