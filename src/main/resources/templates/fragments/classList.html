<div id="class-list-fragment">
    {#if classes.isEmpty}
        <p class="hint">Noch keine Klassen angelegt.</p>
    {#else}
        <div class="class-grid">
            {#for c in classes}
                <div class="class-card">
                    <div class="rename-wrap">
                        <span class="rename-view">
                            <a class="class-name" href="/classes/{c.id}">{c.name}</a>
                            <button type="button" class="rename-toggle" title="Umbenennen" aria-label="Umbenennen"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg></button>
                        </span>
                        <form class="rename-form" hx-patch="/classes/{c.id}/rename" hx-target="#class-list-fragment" hx-swap="outerHTML">
                            <input type="text" name="name" value="{c.name}" required>
                            <input type="text" name="schoolYear" value="{c.schoolYear}" data-original="{c.schoolYear}" required>
                            <button type="submit" class="rename-save" aria-label="Speichern">✓</button>
                            <button type="button" class="rename-cancel" aria-label="Abbrechen">✕</button>
                        </form>
                    </div>
                    <div class="class-year">{c.schoolYear}</div>
                    <div style="margin-top: 0.5rem; display:flex; gap:0.5rem;">
                        <form hx-delete="/classes/{c.id}" hx-target="#class-list-fragment" hx-swap="outerHTML" hx-confirm="Klasse '{c.name}' wirklich löschen? Das löscht auch alle Schüler, Fächer und Noten dieser Klasse.">
                            <button type="submit" class="delete-btn">Löschen</button>
                        </form>
                    </div>
                </div>
            {/for}
        </div>
    {/if}
</div>
