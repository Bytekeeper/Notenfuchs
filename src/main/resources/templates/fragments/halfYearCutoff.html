<div id="half-year-cutoff-fragment">
    <div class="rename-wrap">
        <span class="rename-view">
            {#if schoolClass.halfYearCutoff}
                <span class="rename-display">{schoolClass.halfYearCutoff}</span>
            {#else}
                <span class="rename-display hint">kein Stichtag gesetzt</span>
            {/if}
            <button type="button" class="rename-toggle" title="Halbjahres-Stichtag ändern" aria-label="Halbjahres-Stichtag ändern"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg></button>
        </span>
        <form class="rename-form" hx-patch="/classes/{schoolClass.id}/half-year-cutoff" hx-target="#half-year-cutoff-fragment" hx-swap="outerHTML">
            <input type="date" name="halfYearCutoff" value="{schoolClass.halfYearCutoff ?: ''}" data-original="{schoolClass.halfYearCutoff ?: ''}">
            <button type="submit" class="rename-save" aria-label="Speichern">✓</button>
            <button type="button" class="rename-cancel" aria-label="Abbrechen">✕</button>
        </form>
    </div>
</div>
