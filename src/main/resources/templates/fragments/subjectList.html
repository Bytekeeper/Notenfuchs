<div id="subject-list-fragment">
    {#if subjects.isEmpty}
        <p class="hint">Noch keine Fächer angelegt.</p>
    {#else}
        {#for s in subjects}
            <div class="subject-list-item">
                <div class="rename-wrap">
                    <div class="rename-view">
                        <div>
                            <a href="/subjects/{s.id}">{s.name}</a>
                            <div class="subject-meta">{s.gradeScale.name} · {s.roundingMode}</div>
                        </div>
                        <div class="row-actions">
                            <a class="btn secondary" href="/subjects/{s.id}/grid">Noten</a>
                            <button type="button" class="rename-toggle">Ändern</button>
                            <form hx-delete="/classes/{schoolClass.id}/subjects/{s.id}" hx-target="#subject-list-fragment" hx-swap="outerHTML" hx-confirm="Fach '{s.name}' wirklich löschen? Das löscht auch alle Kategorien, Leistungen und Noten dieses Fachs.">
                                <button type="submit" class="delete-btn">Löschen</button>
                            </form>
                        </div>
                    </div>
                    <form class="rename-form" hx-patch="/classes/{schoolClass.id}/subjects/{s.id}/rename" hx-target="#subject-list-fragment" hx-swap="outerHTML">
                        <input type="text" name="name" value="{s.name}" required>
                        <select name="roundingMode" data-original="{s.roundingMode.name}">
                            <option value="COMMERCIAL" {#if s.roundingMode.name == 'COMMERCIAL'}selected{/if}>Standard (0,5 → aufgerundet)</option>
                            <option value="IN_FAVOR_OF_STUDENT" {#if s.roundingMode.name == 'IN_FAVOR_OF_STUDENT'}selected{/if}>Zugunsten des Schülers</option>
                        </select>
                        <button type="submit" class="rename-save" aria-label="Speichern">Speichern</button>
                        <button type="button" class="rename-cancel" aria-label="Abbrechen">Verwerfen</button>
                    </form>
                </div>
            </div>
        {/for}
    {/if}
</div>
