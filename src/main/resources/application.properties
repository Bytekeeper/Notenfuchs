# Notenfuchs configuration

quarkus.application.name=notenfuchs

# Datasource (PostgreSQL). db-kind stays set for every profile - Dev Services
# needs it to know which container image family to launch for %test (see
# below). Pin the same image docker-compose.yml uses so test/prod see the
# same Postgres version.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.image-name=postgres:16-alpine

# %dev points at `docker compose up postgres` instead of Dev Services.
# Dev Services backs off automatically once jdbc.url is set. This avoids the
# Dev Services reuse feature, which never actually reuses across `quarkus:dev`
# restarts (Quarkus stamps a random process-uuid label into the reuse hash
# every JVM start) and, since reuse-flagged containers are also never handed
# to the Ryuk reaper, leaked one throwaway Postgres container per restart.
# %test is left unset so ITs still get a clean throwaway Testcontainers DB.
# env vars match the docker-compose service defaults; overridable per README
# "Option B" if pointing dev mode at a different database.
%dev.quarkus.datasource.username=${DB_USER:notenfuchs}
%dev.quarkus.datasource.password=${DB_PASSWORD:notenfuchs}
%dev.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/notenfuchs}

%prod.quarkus.datasource.username=${DB_USER:notenfuchs}
%prod.quarkus.datasource.password=${DB_PASSWORD:notenfuchs}
%prod.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/notenfuchs}

# Hibernate ORM must NOT manage the schema - Flyway owns it.
quarkus.hibernate-orm.database.generation=validate

# Flyway runs the migrations in src/main/resources/db/migration at startup.
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

# HTTP
quarkus.http.port=8080

# ---------------------------------------------------------------------------
# OIDC authentication (provider-agnostic: Clerk, Keycloak, Authentik, ...)
# ---------------------------------------------------------------------------
# "web-app" = authorization-code flow with a server-side session cookie, as
# opposed to "service" (bearer-token API auth). This app renders HTML
# (Qute + HTMX), not a token-based SPA, so web-app is the correct mode.
quarkus.oidc.application-type=web-app

# Issuer / discovery URL, e.g. https://<your-app>.clerk.accounts.dev
# (Clerk), or http://localhost:8081/realms/notenfuchs (Keycloak), etc.
# Quarkus appends /.well-known/openid-configuration itself.
quarkus.oidc.auth-server-url=${OIDC_ISSUER_URL:http://localhost:8081/realms/notenfuchs}
quarkus.oidc.client-id=${OIDC_CLIENT_ID:notenfuchs}
quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET:notenfuchs-dev-secret}

# Token issuer to validate against, if it differs from auth-server-url above.
# Defaults to auth-server-url itself (a no-op) - only needed when the app
# reaches the provider via a different URL than the one it signs tokens
# with, e.g. the bundled Pocket ID container in docker-compose.yml: the app
# talks to it over the internal docker network (auth-server-url), but
# Pocket ID signs tokens with its public-facing APP_URL as issuer.
quarkus.oidc.token.issuer=${OIDC_TOKEN_ISSUER:${OIDC_ISSUER_URL}}

# Scopes requested in addition to the default "openid" - needed so UserInfo
# (name/email) is populated for the CurrentUser helper.
quarkus.oidc.authentication.scopes=profile,email

# Local paths for the auth-code redirect and post-logout landing page.
# These are relative to the app; Quarkus turns them into absolute callback
# URLs using the incoming request's host, so no public hostname is baked in
# here. Make sure the *external* callback URL you register with the IdP
# (e.g. https://your-domain.example/auth-callback) matches this path.
quarkus.oidc.authentication.redirect-path=/auth-callback
quarkus.oidc.authentication.restore-path-after-redirect=true

# Cookie-based logout support - see quarkus.oidc.logout.* below and the
# README "Authentication" section for the end-session flow.
quarkus.oidc.logout.path=/logout
quarkus.oidc.logout.post-logout-path=/
# Some providers (Clerk, some Keycloak setups) expect the post_logout_redirect_uri
# parameter name below; harmless no-op for providers that don't use it.
quarkus.oidc.logout.post-logout-uri-param=post_logout_redirect_uri

# ---------------------------------------------------------------------------
# Local built-in auth (default/turbo path): Quarkus' embedded security realm
# + FORM authentication, no external IdP required. See the README's
# "Authentication" section for the full local-vs-OIDC decision flow, and
# de.notenfuchs.security.LocalAuthConfigSource for how NOTENFUCHS_PASSWORD
# drives which mode is actually active.
#
# `enabled` here is BUILD_AND_RUN_TIME_FIXED (gates CDI bean registration at
# build time), so it's always true - one built image must support both modes
# without a rebuild. The fixed username can't be env-driven (map config keys
# aren't interpolated per-entry) - change this literal + rebuild for a
# different one. The password itself is supplied at RUN_TIME by
# LocalAuthConfigSource, not here, so it can come from NOTENFUCHS_PASSWORD
# without a rebuild.
# ---------------------------------------------------------------------------
quarkus.security.users.embedded.enabled=true
quarkus.security.users.embedded.plain-text=true

quarkus.http.auth.form.enabled=true
quarkus.http.auth.form.login-page=/login
quarkus.http.auth.form.error-page=/login?error=true
quarkus.http.auth.form.landing-page=/
quarkus.http.auth.form.http-only-cookie=true

# ---------------------------------------------------------------------------
# Authorization: require login for the whole app by default. Health/static
# assets, the login page/form-post target, and the OIDC callback/logout paths
# stay public. Because this app only ever holds one school's/teacher's
# sensitive student data, read (GET) endpoints are locked down too, not just
# mutating ones.
# ---------------------------------------------------------------------------
quarkus.http.auth.permission.public.paths=/auth-callback,/logout,/login,/j_security_check,/q/health/*,/favicon.ico,/static/*
quarkus.http.auth.permission.public.policy=permit

# auth-mechanism is pinned dynamically by LocalAuthConfigSource ("form" or
# "code" - the OIDC code-flow mechanism's actual scheme name, NOT "oidc") so
# whichever mode is inactive never competes to answer an unauthenticated
# request's challenge.
quarkus.http.auth.permission.authenticated.paths=/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# ---------------------------------------------------------------------------
# Local dev / test bypass: the OIDC tenant is deactivated in the "dev" and
# "test" profiles so `quarkus:dev` and `./mvnw test` work without a live IdP.
# Note: this is `tenant-enabled`, not `enabled` - the latter is a build-time
# switch that removes the extension's CDI beans entirely (JsonWebToken,
# UserInfo, ...), which breaks CurrentUser's unconditional @Inject fields.
# `tenant-enabled=false` keeps those beans registered (as inert/anonymous)
# and just skips authentication, matching CurrentUser's documented contract.
# Do NOT rely on this in production - it is only active for these two profiles.
# ---------------------------------------------------------------------------
%dev.quarkus.oidc.tenant-enabled=false
%dev.quarkus.http.auth.permission.authenticated.policy=permit
%test.quarkus.oidc.tenant-enabled=false
%test.quarkus.http.auth.permission.authenticated.policy=permit

# ---------------------------------------------------------------------------
# Playwright Dev Services (quarkus-playwright, test-scope only): the
# Playwright-driven ITs (src/test/java/de/notenfuchs/e2e) run Chromium inside
# a container instead of requiring a local browser install - same idea as the
# Postgres Dev Services above. shared-network=true exposes this JVM's test
# HTTP port to that container as host.testcontainers.internal:<port>, since
# the app under test runs in this JVM, not in a container.
# ---------------------------------------------------------------------------
%test.quarkus.playwright.devservices.enabled=true
%test.quarkus.playwright.devservices.shared-network=true
