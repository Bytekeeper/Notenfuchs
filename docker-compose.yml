services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notenfuchs
      POSTGRES_USER: notenfuchs
      POSTGRES_PASSWORD: notenfuchs
    volumes:
      - notenfuchs-postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notenfuchs -d notenfuchs"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/notenfuchs
      DB_USER: notenfuchs
      DB_PASSWORD: notenfuchs
    ports:
      - "8080:8080"

volumes:
  notenfuchs-postgres-data:
