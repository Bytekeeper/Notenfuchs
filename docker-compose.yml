services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notenfuchs
      POSTGRES_USER: notenfuchs
      POSTGRES_PASSWORD: notenfuchs
    volumes:
      - notenfuchs-postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notenfuchs -d notenfuchs"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Default stack: just this + postgres. Local built-in auth (NOTENFUCHS_PASSWORD
  # below) needs nothing else - no separate IdP container, no bootstrap step. See
  # the README's "Authentication" section for the local-vs-OIDC decision, and
  # docker-compose.oidc.yml for the optional SSO overlay.
  #
  # Both `image` and `build` are set: plain `docker compose up` pulls the
  # prebuilt image from GHCR (published by .github/workflows/publish-image.yml
  # on every push to master) so nobody needs a local Java/Maven toolchain.
  # `docker compose up --build` (or `docker compose build`) still builds
  # locally from Dockerfile.jvm instead, for contributors running their own
  # changes - see the README's "Option A" section.
  app:
    image: ghcr.io/bytekeeper/notenfuchs:latest
    build:
      context: .
      dockerfile: src/main/docker/Dockerfile.jvm
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/notenfuchs
      DB_USER: notenfuchs
      DB_PASSWORD: notenfuchs
      # Fixed username "lehrer" (see LocalAuthConfigSource); set this in .env.
      # Leave unset only if you're using the docker-compose.oidc.yml overlay
      # instead - the app refuses to start in prod with neither configured.
      NOTENFUCHS_PASSWORD: ${NOTENFUCHS_PASSWORD:-}
    ports:
      # Open to every interface by default, matching the "just docker compose
      # up, no proxy needed" default path (see the README's "Option A"
      # section). If you're reverse-proxying Notenfuchs itself (see
      # OIDC_TRUST_PROXY in docker-compose.oidc.yml and the README's "Running
      # behind your own reverse proxy" section), set APP_HOST_BIND=127.0.0.1
      # in .env so the container is only reachable through that proxy, not
      # directly on this port.
      - "${APP_HOST_BIND:-0.0.0.0}:8080:8080"

  # One-shot: seeds a fixed example class ("Demo-Klasse 8b", see
  # demo/seed-reset.sql) the first time this stack boots against a fresh
  # Postgres volume, so a new self-hoster (or a fresh local dev setup) has
  # something to look at without typing anything in first. Detected via
  # "school_class has zero rows" rather than volume age - that's what a
  # fresh install actually looks like, and needs no extra state tracking.
  # Waits for the app container's Flyway migration to create the schema
  # (this container can start as soon as postgres is healthy, well before
  # that). Skipped once any class exists, including if the demo class itself
  # is later deleted and replaced by a real one - a stack that's ever had
  # data in it is never touched again.
  #
  # Seeded rows are owned by "lehrer", the fixed local-auth username (see
  # LocalAuthConfigSource) - if you're using the docker-compose.oidc.yml
  # overlay instead of local auth, this seeds a class nobody can log in to
  # see. Harmless, but delete the school_class row manually if that bothers
  # you.
  seed-demo:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: notenfuchs
    volumes:
      - ./demo/seed-reset.sql:/seed-reset.sql:ro
    entrypoint:
      - sh
      - -c
      - |
        until psql -h postgres -U notenfuchs -d notenfuchs -tAc "SELECT to_regclass('public.school_class')" 2>/dev/null | grep -q school_class; do
          echo "seed-demo: waiting for schema migration..."
          sleep 2
        done
        count=$$(psql -h postgres -U notenfuchs -d notenfuchs -tAc "SELECT count(*) FROM school_class")
        if [ "$$count" = "0" ]; then
          echo "seed-demo: fresh database, loading demo class"
          psql -h postgres -U notenfuchs -d notenfuchs -f /seed-reset.sql
        else
          echo "seed-demo: existing data found, skipping"
        fi

volumes:
  notenfuchs-postgres-data:
