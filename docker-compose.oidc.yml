# Optional overlay: adds Pocket ID as an external OIDC provider instead of the
# default local built-in auth. It overrides the `app` service's environment
# and depends_on (extends the base file's `app`, doesn't just add new
# services), which is exactly the merge `include:` can't do - Compose only
# merges same-named services across multiple -f files, never across an
# `include:`, so this has to stay an overlay. Use together with the base file:
#
#   docker compose -f docker-compose.yml -f docker-compose.oidc.yml up
#
# (add --build instead if you're running your own local changes to the app
# image, see the README's "Option A" section). To avoid typing both -f flags
# every time, set COMPOSE_FILE=docker-compose.yml:docker-compose.oidc.yml in
# .env once - Compose reads that automatically, so plain `docker compose up`
# (and down/logs/...) then merge both files with no flags needed.
#
# See the README's "Authentication" section (and "Setting up Pocket ID") for
# the full walkthrough. Leave NOTENFUCHS_PASSWORD unset in .env when using this
# overlay - local auth and OIDC are never active at the same time; whichever
# env var is actually set decides which mode runs.
services:
  app:
    depends_on:
      pocket-id:
        condition: service_healthy
    environment:
      # The app reaches Pocket ID over the internal docker network, but must
      # validate tokens against the issuer Pocket ID actually signs with (its
      # public-facing APP_URL) - see the quarkus.oidc.token.issuer comment in
      # application.properties.
      OIDC_ISSUER_URL: http://pocket-id:1411
      OIDC_TOKEN_ISSUER: http://${BASE_URL:-localhost}:1411
      OIDC_CLIENT_ID: notenfuchs
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}

  # Lightweight, passkey-only OIDC provider - see the README's "Setting up
  # Pocket ID" section. The Notenfuchs OIDC client and teacher accounts are
  # created by hand in Pocket ID's own admin UI (no bootstrap automation) -
  # ALLOW_USER_SIGNUPS: withToken is what makes the UI's "Create signup
  # token" action available for that. Required secret
  # (POCKET_ID_ENCRYPTION_KEY) lives in .env; see .env.example for how to
  # generate it.
  pocket-id:
    image: pocketid/pocket-id:v2
    restart: unless-stopped
    environment:
      APP_URL: http://${BASE_URL:-localhost}:1411
      INTERNAL_APP_URL: http://pocket-id:1411
      ENCRYPTION_KEY: ${POCKET_ID_ENCRYPTION_KEY}
      ALLOW_USER_SIGNUPS: withToken
      UI_CONFIG_DISABLED: "true"
      TRUST_PROXY: ${TRUST_PROXY:-false}
    ports:
      - 1411:1411
    volumes:
      - "notenfuchs-pocket-id-data:/app/data"
    healthcheck:
      test: [ "CMD", "/app/pocket-id", "healthcheck" ]
      interval: 1m30s
      timeout: 5s
      retries: 2
      start_period: 10s

volumes:
  notenfuchs-pocket-id-data:
